version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_MODE=sqlite
      - DB_PATH=/app/data/ritam.db
      - ENVIRONMENT=development
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

